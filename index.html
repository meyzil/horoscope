<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורוסקופ של אבא ואמא ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night: #0a0a1a;
            --deep: #10102a;
            --card: #16163a;
            --gold: #d4a843;
            --gold-light: #f0cc7a;
            --silver: #c8d0e0;
            --text: #eef0f8;
        }

        body {
            font-family: 'Noto Serif Hebrew', serif;
            background-color: var(--night);
            background-image: radial-gradient(circle at 50% 50%, var(--deep), var(--night));
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        /* אפקט כוכבים עדין */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.1;
            z-index: -1;
        }

        .container {
            background-color: var(--card);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(212, 168, 67, 0.2);
            text-align: center;
            border: 1px solid rgba(212, 168, 67, 0.3);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: var(--gold);
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--silver);
            margin-bottom: 2rem;
            display: block;
        }

        select {
            background-color: #1a1a4a;
            color: var(--text);
            border: 2px solid var(--gold);
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 10px;
            appearance: none;
            width: 100%;
            cursor: pointer;
            outline: none;
            font-family: 'Noto Serif Hebrew', serif;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(135deg, var(--gold), #b58930);
            color: var(--night);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: 'Noto Serif Hebrew', serif;
        }

        button:hover {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 168, 67, 0.4);
        }

        #result {
            margin-top: 35px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--silver);
            min-height: 60px;
        }

        #result-text {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-right: 4px solid var(--gold); /* העברתי לימין לעברית */
            display: none;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>הורוסקופ ✨<br><span class="subtitle">של אבא ואמא</span></h1>
    
    <select id="zodiac">
        <option value="" disabled selected>בחרו מזל...</option>
        <option value="טלה">Aries (טלה)</option>
        <option value="שור">Taurus (שור)</option>
        <option value="תאומים">Gemini (תאומים)</option>
        <option value="סרטן">Cancer (סרטן)</option>
        <option value="אריה">Leo (אריה)</option>
        <option value="בתולה">Virgo (בתולה)</option>
        <option value="מאזניים">Libra (מאזניים)</option>
        <option value="עקרב">Scorpio (עקרב)</option>
        <option value="קשת">Sagittarius (קשת)</option>
        <option value="גדי">Capricorn (גדי)</option>
        <option value="דלי">Aquarius (דלי)</option>
        <option value="דגים">Pisces (דגים)</option>
    </select>

    <button onclick="getHoroscope()">קבלת תחזית</button>
    
    <div id="result">
        <div id="result-text"></div>
    </div>
</div>

<script>
    function getHoroscope() {
        const predictions = [
            "היום צפוי לכם יום מלא באנרגיות חיוביות. זמן מצוין להתחלות חדשות ולבילוי משפחתי.",
            "הכוכבים ממליצים לקחת פסק זמן קטן ולנוח. השקיעו בעצמכם וברוגע שלכם.",
            "האינטואיציה שלכם חדה היום מתמיד. סמכו עליה בהחלטות הקטנות והגדולות.",
            "האהבה נמצאת באוויר! זמן נהדר לחיזוק קשרים ולשיחות עומק עם מי שקרוב אליכם.",
            "מישהו קרוב חושב עליכם ויפתיע אתכם לטובה בהמשך היום. תהיו מוכנים."
        ];
        
        const random = predictions[Math.floor(Math.random() * predictions.length)];
        const sign = document.getElementById('zodiac').value;
        const resultContainer = document.getElementById('result-text');
        
        if (!sign) {
            resultContainer.innerText = "אנא בחרו מזל כדי לקבל תחזית.";
            resultContainer.style.borderRightColor = "#ff6b6b"; /* אדום לשגיאה */
        } else {
            resultContainer.innerText = "תחזית למזל " + sign + ": " + random;
            resultContainer.style.borderRightColor = "var(--gold)";
        }
        
        resultContainer.style.display = 'block';
    }
</script>

</body>
</html>
