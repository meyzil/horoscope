<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורוסקופ של אבא ואמא ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night: #0a0a1a;
            --deep: #10102a;
            --card: #16163a;
            --gold: #d4a843;
            --gold-light: #f0cc7a;
            --silver: #c8d0e0;
            --text: #eef0f8;
        }

        body {
            font-family: 'Noto Serif Hebrew', serif;
            background-color: var(--night);
            background-image: radial-gradient(circle at 50% 50%, var(--deep), var(--night));
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.1;
            z-index: -1;
        }

        .container {
            background-color: var(--card);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212, 168, 67, 0.15);
            text-align: center;
            border: 1px solid rgba(212, 168, 67, 0.3);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: var(--gold);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--silver);
            margin-bottom: 2rem;
            display: block;
            letter-spacing: 1px;
        }

        select {
            background-color: #1a1a4a;
            color: var(--text);
            border: 2px solid var(--gold);
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            outline: none;
            font-family: 'Noto Serif Hebrew', serif;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        button {
            background: linear-gradient(135deg, var(--gold), #b58930);
            color: var(--night);
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-family: 'Noto Serif Hebrew', serif;
            width: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            transform: translateY(-2px);
        }

        #result-text {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border-right: 4px solid var(--gold);
            display: none;
            text-align: right;
            line-height: 1.6;
            font-size: 1.2rem;
            color: var(--gold-light);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>הורוסקופ ✨</h1>
    <span class="subtitle">של אבא ואמא</span>
    
    <select id="user-select">
        <option value="" disabled selected>מי בודק היום?</option>
        <option value="dad">אבא (דלי ♒)</option>
        <option value="mom">אמא (עקרב ♏)</option>
    </select>

    <button onclick="showPrediction()">גלו מה צפוי לכם</button>
    
    <div id="result-text"></div>
</div>

<script>
    function showPrediction() {
        const user = document.getElementById('user-select').value;
        const resultDiv = document.getElementById('result-text');
        
        const commonPhrases = [
            "היום הכל ילך בשמחה ובלב פתוח.",
            "תעשו הכל בנחת, העולם לא בורח.",
            "היום המוטו שלכם הוא: מיט א רוהיגקייט.",
            "הכוכבים אומרים: אן לחץ! הכל יסתדר על הצד הטוב ביותר."
        ];
        
        const dadTips = [
            "אבא, היום זה זמן מצוין לקחת רגע לעצמך ולנוח.",
            "דלי יקר, היום האנרגיה שלך בשיאה. תיהנה מהיום בנחת.",
            "אבא, צפויה לך הפתעה נעימה היום. מיט א רוהיגקייט!",
            ...commonPhrases
        ];
        
        const momTips = [
            "אמא, היום הכל יסתדר בשמחה ובקלות.",
            "היום הכוכבים מחייכים אלייך. קחי הכל אן לחץ.",
            "אמא, הסבלנות שלך תשתלם היום בענק. בנחת!",
            ...commonPhrases
        ];

        let message = "";
        if (user === "dad") {
            message = dadTips[Math.floor(Math.random() * dadTips.length)];
        } else if (user === "mom") {
            message = momTips[Math.floor(Math.random() * momTips.length)];
        }

        if (!user) {
            resultDiv.innerText = "קודם תבחרו אם זה אבא או אמא...";
        } else {
            resultDiv.innerText = message;
        }
        
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
