<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורוסקופ אסטרולוגי: אבא ואמא ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --night: #0a0a1a; --deep: #10102a; --card: #16163a;
            --gold: #d4a843; --gold-light: #f0cc7a; --silver: #c8d0e0; --text: #eef0f8;
        }
        body {
            font-family: 'Noto Serif Hebrew', serif; background-color: var(--night);
            background-image: radial-gradient(circle at 50% 50%, var(--deep), var(--night));
            color: var(--text); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; direction: rtl;
        }
        .container {
            background-color: var(--card); padding: 2.5rem; border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212, 168, 67, 0.15);
            text-align: center; border: 1px solid rgba(212, 168, 67, 0.3);
            width: 90%; max-width: 500px;
        }
        h1 { color: var(--gold); font-size: 2rem; margin-bottom: 1.5rem; }
        select {
            background: #1a1a4a; color: var(--text); border: 2px solid var(--gold);
            padding: 15px; font-size: 1.1rem; border-radius: 12px; width: 100%;
            margin-bottom: 20px; font-family: inherit; outline: none;
        }
        button {
            background: linear-gradient(135deg, var(--gold), #b58930);
            color: var(--night); border: none; padding: 18px; font-size: 1.2rem;
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%;
            transition: 0.3s; font-family: inherit;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 168, 67, 0.4); }
        .result-box {
            margin-top: 25px; text-align: right; display: none;
            background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px;
            border-right: 4px solid var(--gold); animation: fadeIn 0.5s;
        }
        .analysis { color: var(--silver); font-size: 0.95rem; margin-bottom: 15px; font-style: italic; }
        .prediction { color: var(--gold-light); font-size: 1.15rem; font-weight: bold; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>מפת כוכבים אישית ✨</h1>
    <select id="user-select">
        <option value="" disabled selected>מי בודק את הכוכבים?</option>
        <option value="dad">אבא (דלי ♒ - אוויר)</option>
        <option value="mom">אמא (עקרב ♏ - מים)</option>
    </select>
    <button onclick="generateHoroscope()">ניתוח אסטרולוגי</button>
    <div id="result-box" class="result-box">
        <div id="analysis" class="analysis"></div>
        <div id="prediction" class="prediction"></div>
    </div>
</div>

<script>
function generateHoroscope() {
    const user = document.getElementById('user-select').value;
    const box = document.getElementById('result-box');
    const analysisDiv = document.getElementById('analysis');
    const predDiv = document.getElementById('prediction');

    const phrases = [
        "בשמחה גדולה", "בנחת אמיתית", "מיט א רוהיגקייט", "אן לחץ בכלל", "ברוגע מוחלט",
        "בלי עצבים, הכל עובר", "שלווה קוסמית", "פשוט לנשום עמוק", "הכל מלמעלה, בנחת",
        "יום של שקט תעשייתי", "בלי דאגות מיותרות", "נחת רוח לכולם", "הכל זורם על מי מנוחות",
        "יום של חיוך פנימי", "בלי רעשי רקע", "רוגע נפשי עמוק", "מיט א גאנצע שמחה",
        "הכל יסתדר, אן לחץ", "זמן ליהנות מהרגע", "יום של שלום בית ושלווה",
        "בלי למהר לשום מקום", "מיט א רוהיגקייט ושלווה", "שמחה בלב ובנשמה",
        "בנחת ובסבלנות", "יום ללא דאגות", "רוגע שמגיע עד הכוכבים",
        "אן לחץ, הכל רגוע", "מיט א שמחה'דיגע פנים", "פשוט להיות בנחת", "הכל קטן עליכם"
    ];

    const dadAnalysis = "ניתוח דלי: מזל אוויר, נשלט ע"י אורנוס. חשיבה עצמאית, מקוריות וצורך בחופש.";
    const momAnalysis = "ניתוח עקרב: מזל מים, נשלט ע"י פלוטו. אינטואיציה חזקה, עומק רגשי ועוצמה פנימית.";

    let randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
    
    if (user === 'dad') {
        analysisDiv.innerText = dadAnalysis;
        predDiv.innerText = "אבא, הכוכבים מראים שסידור הכוכבים היום דורש ממך לעשות הכל " + randomPhrase + ".";
    } else if (user === 'mom') {
        analysisDiv.innerText = momAnalysis;
        predDiv.innerText = "אמא, האנרגיה של פלוטו היום מכוונת אותך לפעול " + randomPhrase + ".";
    }

    box.style.display = 'block';
}
</script>
</body>
</html>
